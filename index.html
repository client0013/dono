<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel do Dono</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .aba { padding: 10px; cursor: pointer; background: #ddd; border: none; margin-right: 5px; }
        .ativa { background: #c62828; color: white; }
        .secao { display: none; background: white; padding: 20px; margin-top: 10px; border-radius: 8px; }
        .visivel { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn-del { background: #d32f2f; color: white; border: none; padding: 5px; cursor: pointer; }
        .btn-edit { background: #1976d2; color: white; border: none; padding: 5px; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>

<button class="aba ativa" onclick="mudarAba('cadastro')">Cadastro</button>
<button class="aba" onclick="mudarAba('cardapio')">Cardápio</button>
<button class="aba" onclick="mudarAba('pedidos')">Pedidos</button>

<div id="cadastro" class="secao visivel">
    <h3 id="titulo-form">Novo Produto</h3>
    <input type="hidden" id="edit-id">
    <input id="nome" placeholder="Nome" style="width:100%; padding:8px; margin:5px 0;">
    <input id="desc" placeholder="Descrição" style="width:100%; padding:8px; margin:5px 0;">
    <input id="preco" type="number" placeholder="Preço" style="width:100%; padding:8px; margin:5px 0;">
    <select id="cat" style="width:100%; padding:8px; margin:5px 0;">
        <option value="Pizza">Pizza</option>
        <option value="Bebida">Bebida</option>
    </select>
    <button onclick="salvarProduto()" style="width:100%; padding:10px; background:green; color:white; border:none; cursor:pointer;">Salvar</button>
</div>

<div id="cardapio" class="secao">
    <h3>Pizzas</h3>
    <table><tbody id="lista-pizzas"></tbody></table>
    <h3>Bebidas</h3>
    <table><tbody id="lista-bebidas"></tbody></table>
</div>

<div id="pedidos" class="secao">
    <h3>Pedidos</h3>
    <div id="lista-pedidos"></div>
</div>

<script>
    if (prompt("Senha:") !== "1234") { location.reload(); }
    const URL = "https://pkocqdyhhyfumuqublek.supabase.co";
    const KEY = "sb_publishable_NFBsbVhsyVOzDrQYhTA7cg_PR04G32-";
    const head = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' };

    function mudarAba(id) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('visivel'));
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('visivel');
        event.target.classList.add('ativa');
        if(id === 'cardapio') carregarCardapio();
        if(id === 'pedidos') carregarPedidos();
    }

    async function carregarCardapio() {
        const res = await fetch(`${URL}/rest/v1/produtos?select=*`, { headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } });
        const data = await res.json();
        
        const render = (cat) => data.filter(p => p.categoria === cat).map(p => `
            <tr>
                <td><b>${p.nome}</b><br><small>${p.descricao || ''}</small></td>
                <td>R$ ${parseFloat(p.preco).toFixed(2)}</td>
                <td>
                    <button class="btn-edit" onclick="prepararEdicao(${p.id}, '${p.nome}', '${p.descricao || ''}', ${p.preco}, '${p.categoria}')">Edit</button>
                    <button class="btn-del" onclick="deletar(${p.id})">X</button>
                </td>
            </tr>
        `).join('');

        document.getElementById("lista-pizzas").innerHTML = render('Pizza');
        document.getElementById("lista-bebidas").innerHTML = render('Bebida');
    }

    function prepararEdicao(id, nome, desc, preco, cat) {
        document.getElementById("edit-id").value = id;
        document.getElementById("nome").value = nome;
        document.getElementById("desc").value = desc;
        document.getElementById("preco").value = preco;
        document.getElementById("cat").value = cat;
        document.getElementById("titulo-form").innerText = "Editando Produto";
        mudarAba('cadastro');
    }

    async function salvarProduto() {
        const id = document.getElementById("edit-id").value;
        const dados = { 
            nome: document.getElementById("nome").value, 
            descricao: document.getElementById("desc").value, 
            preco: parseFloat(document.getElementById("preco").value), 
            categoria: document.getElementById("cat").value 
        };

        if (id) {
            await fetch(`${URL}/rest/v1/produtos?id=eq.${id}`, { method: 'PATCH', headers: {...head, 'Prefer': 'return=representation'}, body: JSON.stringify(dados) });
        } else {
            await fetch(`${URL}/rest/v1/produtos`, { method: 'POST', headers: {...head, 'Prefer': 'return=representation'}, body: JSON.stringify(dados) });
        }
        alert("Salvo!");
        location.reload();
    }

    async function deletar(id) {
        await fetch(`${URL}/rest/v1/produtos?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } });
        carregarCardapio();
    }

    async function carregarPedidos() {
        const res = await fetch(`${URL}/rest/v1/pedidos?select=*`, { headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } });
        const data = await res.json();
        document.getElementById("lista-pedidos").innerHTML = data.map(p => `
            <div style="border-bottom:1px solid #ccc; padding:10px;">
                <b>Cliente: ${p.nome}</b><br>Itens: ${p.itens}<br><b>Total: R$ ${p.total}</b>
            </div>
        `).join('');
    }
</script>
</body>
</html>
